<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glockenspiel">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<title>🎵 Mein Glockenspiel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FFF8F0; --warm: #7C5A3C; --warmL: #A08060; --shadow: rgba(160,120,70,0.16);
  --nC:#E74C3C; --nD:#E67E22; --nE:#F1C40F; --nF:#27AE60; --nG:#3498DB; --nA:#6366F1; --nB:#9B59B6;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: 'Avenir Next','Nunito','Quicksand',-apple-system,sans-serif;
  background: var(--bg);
  touch-action: manipulation;
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color: transparent;
}
.scr { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.scr.on { display:flex; flex-direction:column; }

/* ══════ SONG SELECT ══════ */
#selScreen {
  background: linear-gradient(155deg,#FFF5EE 0%,#FDEBD3 35%,#E6F0FA 100%);
  align-items:center; justify-content:center; gap:22px; padding:20px;
}
.logo { font-size:clamp(26px,5.5vw,46px); font-weight:800; color:var(--warm); text-align:center; }
.sub { font-size:clamp(12px,2.2vw,16px); color:var(--warmL); font-weight:600; margin-top:-10px; }
.sgrid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:clamp(10px,2.2vw,22px); max-width:560px; width:100%; padding:0 10px;
}
.sbtn {
  aspect-ratio:1; border:none; border-radius:24px; background:white;
  box-shadow: 0 4px 18px var(--shadow), 0 1px 3px rgba(0,0,0,0.04);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  padding:8px; position:relative; overflow:hidden;
}
.sbtn::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 30% 30%,rgba(255,255,255,0.6) 0%,transparent 70%);
  pointer-events:none;
}
.sbtn:active { transform:scale(0.91); }
.sbtn .em { font-size:clamp(34px,7.5vw,56px); line-height:1; z-index:1; }
.sbtn .lb {
  font-size:clamp(8px,1.4vw,11px); color:var(--warmL);
  text-align:center; line-height:1.15; font-weight:700; z-index:1;
}

/* ══════ MIC SCREEN ══════ */
#micScreen {
  background: linear-gradient(155deg,#FFF5EE,#E6F0FA);
  align-items:center; justify-content:center; gap:28px; padding:40px;
}
.mic-icon { font-size:clamp(60px,18vw,100px); animation:micFloat 2s ease-in-out infinite; }
@keyframes micFloat {
  0%,100%{ transform:translateY(0) rotate(-3deg); }
  50%{ transform:translateY(-14px) rotate(3deg); }
}
.mic-msg {
  font-size:clamp(14px,3vw,20px); color:var(--warm);
  text-align:center; font-weight:600; line-height:1.5; max-width:340px;
}
.mic-go {
  padding:18px 52px; border:none; border-radius:50px;
  background: linear-gradient(135deg,#FF9A56,#FF6B8A);
  color:white; font-size:clamp(18px,4vw,26px); font-weight:800;
  cursor:pointer; box-shadow:0 6px 28px rgba(255,107,138,0.3);
  transition: transform 0.2s; font-family:inherit;
}
.mic-go:active { transform:scale(0.94); }
.mic-err {
  font-size:clamp(12px,2.2vw,15px); color:#E74C3C;
  text-align:center; max-width:320px; font-weight:600;
  display:none; line-height:1.4;
}

/* ══════ PLAY SCREEN ══════ */
#playScreen {
  background: linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  padding:0; gap:0; overflow:hidden;
}
.tbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 10px; flex-shrink:0; min-height:42px; z-index:10;
}
.bbtn {
  width:36px; height:36px; border:none; border-radius:50%;
  background:rgba(255,255,255,0.15); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:inherit; color:white; transition:transform .15s;
}
.bbtn:active { transform:scale(0.88); }
.stitle { font-size:clamp(13px,2.4vw,18px); color:white; font-weight:800; }
.stars {
  display:flex; align-items:center; gap:3px;
  background:rgba(255,255,255,0.15); border-radius:14px; padding:3px 10px;
  font-weight:800; font-size:clamp(12px,2.2vw,16px);
}
.stars .si { color:#F1C40F; }
.stars .sn { color:white; }

/* Falling lanes area */
#laneArea {
  flex:1; position:relative; overflow:hidden; min-height:0;
}
/* Lane columns (one per bar) */
.lane {
  position:absolute; top:0; bottom:0;
}
/* Hit zone line at bottom of lanes */
#hitZone {
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background: rgba(255,255,255,0.3);
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
  z-index:5;
}
/* Falling note dot */
.fnote {
  position:absolute; width:80%; left:10%;
  border-radius:50%; aspect-ratio:1;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:clamp(10px,1.8vw,14px); color:white;
  text-shadow:0 1px 3px rgba(0,0,0,0.4);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  z-index:3;
  transition: opacity 0.15s;
}
.fnote.waiting {
  animation: fnotePulse 1s ease-in-out infinite;
}
@keyframes fnotePulse {
  0%,100% { box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 2px 20px rgba(255,255,255,0.4), 0 0 30px currentColor; }
}

/* Glockenspiel bars at bottom */
.glock-wrap {
  flex-shrink:0; padding:0 4px 8px; z-index:10;
  background: linear-gradient(0deg, rgba(15,52,96,1) 0%, transparent 100%);
  padding-top:10px;
}
.glock {
  display:flex; align-items:flex-end;
  gap:clamp(2px,0.4vw,4px);
  height:clamp(60px,12vh,100px); width:100%; justify-content:center;
}
.bar {
  flex:1; max-width:44px; min-width:0; height:100%;
  border-radius:5px 5px 3px 3px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
  padding-bottom:clamp(3px,0.8vw,7px);
  position:relative; cursor:default;
  background: linear-gradient(180deg,#888 0%,#666 40%,#555 100%);
  box-shadow: 0 2px 6px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.1);
  transition: background 0.1s, box-shadow 0.1s, transform 0.1s;
}
.bar .nn {
  font-size:clamp(9px,1.8vw,14px); font-weight:900;
  color:rgba(255,255,255,0.35); text-shadow:0 1px 2px rgba(0,0,0,0.2);
  pointer-events:none; z-index:2; line-height:1;
}
.bar.target {
  background: linear-gradient(180deg, var(--tc) 0%, var(--tc) 100%) !important;
  box-shadow: 0 0 15px var(--tc), 0 0 30px var(--tc);
  border-color: rgba(255,255,255,0.4);
}
.bar.target .nn { color:white; }
.bar.played-correct {
  background: linear-gradient(180deg,#2ecc71 0%,#27ae60 100%) !important;
  box-shadow: 0 0 20px #27ae60, 0 0 40px #27ae60;
  transform: scaleY(1.05);
}
.bar.played-correct .nn { color:white; }
.bar.played-wrong {
  background: linear-gradient(180deg,#e74c3c 0%,#c0392b 100%) !important;
  box-shadow: 0 0 20px #e74c3c, 0 0 40px #e74c3c;
  transform: scaleX(0.95);
}
.bar.played-wrong .nn { color:white; }

/* Progress dots */
.mstrip {
  display:flex; align-items:center; justify-content:center;
  gap:3px; padding:4px 8px; flex-shrink:0; z-index:10;
  overflow-x:auto; scrollbar-width:none;
}
.mstrip::-webkit-scrollbar { display:none; }
.md {
  width:clamp(8px,1.5vw,12px); height:clamp(8px,1.5vw,12px);
  border-radius:50%; flex-shrink:0; opacity:0.2;
  transition: opacity .3s, transform .3s;
}
.md.done { opacity:1; }
.md.cur { opacity:1; transform:scale(1.6); box-shadow:0 0 8px currentColor; }

/* ══════ SPARKLES ══════ */
#sparks { position:fixed; inset:0; pointer-events:none; z-index:200; }
.spk {
  position:absolute; pointer-events:none; font-size:18px;
  animation: spkFly .85s ease-out forwards;
}
@keyframes spkFly {
  0%{ opacity:1; transform:translate(0,0) scale(1) rotate(0); }
  100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(.15) rotate(420deg); }
}

/* ══════ CELEBRATION ══════ */
#celScreen {
  background: linear-gradient(160deg,#FFF8F0 0%,#FFEAA7 50%,#E8F4FD 100%);
  align-items:center; justify-content:center; flex-direction:column; gap:16px; padding:30px;
}
.ctrophy { font-size:clamp(60px,16vw,120px); animation:cBounce .85s ease infinite; }
@keyframes cBounce { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-18px) rotate(3deg)} }
.cstars { display:flex; gap:8px; font-size:clamp(28px,7vw,50px); animation:csIn .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes csIn { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
.cmsg { font-size:clamp(18px,4vw,28px); color:var(--warm); font-weight:800; text-align:center; }
.cbtns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.cbtn {
  padding:15px 36px; border:none; border-radius:50px;
  font-size:clamp(16px,3.5vw,24px); font-weight:800;
  cursor:pointer; transition:transform .2s; font-family:inherit;
  box-shadow:0 4px 18px var(--shadow);
}
.cbtn:active { transform:scale(0.93); }
.cbtn.again { background:linear-gradient(135deg,#FF9A56,#FF6B8A); color:white; }
.cbtn.home { background:white; color:var(--warm); }
.confetti {
  position:fixed; top:-20px; width:10px; height:10px;
  border-radius:2px; pointer-events:none; z-index:199;
  animation: cFall linear forwards;
}
@keyframes cFall { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
.dbg { position:fixed;bottom:3px;right:3px;font-size:9px;color:rgba(255,255,255,0.3);pointer-events:none;z-index:300; }
</style>
</head>
<body>

<div id="sparks"></div>

<!-- ═══ SONG SELECT ═══ -->
<div class="scr on" id="selScreen">
  <div class="logo">🎵 Mein Glockenspiel 🎵</div>
  <div class="sub">Wähle ein Lied!</div>
  <div class="sgrid" id="sgrid"></div>
</div>

<!-- ═══ MIC PROMPT ═══ -->
<div class="scr" id="micScreen">
  <div class="mic-icon">🎤</div>
  <div class="mic-msg">Erlaube das Mikrofon, damit ich dein Glockenspiel hören kann!</div>
  <button class="mic-go" id="micGo">▶️ Los geht's!</button>
  <div class="mic-err" id="micErr">
    ❌ Mikrofon nicht verfügbar.<br>
    Bitte öffne die App in Safari und erlaube den Zugriff.
  </div>
</div>

<!-- ═══ PLAY ═══ -->
<div class="scr" id="playScreen">
  <div class="tbar">
    <button class="bbtn" onclick="goMenu()">↩</button>
    <div class="stitle" id="pTitle"></div>
    <div class="stars"><span class="si">⭐</span><span class="sn" id="pStars">0</span></div>
  </div>
  <div class="mstrip" id="mstrip"></div>
  <div id="laneArea">
    <div id="hitZone"></div>
  </div>
  <div class="glock-wrap">
    <div class="glock" id="glock"></div>
  </div>
</div>

<!-- ═══ CELEBRATION ═══ -->
<div class="scr" id="celScreen">
  <div class="ctrophy">🎉</div>
  <div class="cstars">⭐⭐⭐</div>
  <div class="cmsg">Super gemacht!</div>
  <div class="cbtns">
    <button class="cbtn again" onclick="replay()">🔄 Nochmal!</button>
    <button class="cbtn home" onclick="goMenu()">🏠</button>
  </div>
</div>

<div class="dbg" id="dbg"></div>

<script>
// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
const NOTES = ['C','D','E','F','G','A','B'];
const GERMAN = {C:'C',D:'D',E:'E',F:'F',G:'G',A:'A',B:'H'};
const NRAW = {C:'#E74C3C',D:'#E67E22',E:'#F1C40F',F:'#27AE60',G:'#3498DB',A:'#6366F1',B:'#9B59B6'};
const SEMI = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};

const BARS = [];
for (let o = 6; o <= 7; o++) {
  for (const n of NOTES) {
    const midi = SEMI[n] + (o+1)*12;
    BARS.push({ n, o, midi, freq: 440*Math.pow(2,(midi-69)/12), id: n+o });
    if (n==='F' && o===7) break;
  }
}

// Songs with timing: each note has [noteId, beats] where 1 beat = quarter note
const SONGS = [
  { title:'Oh Tannenbaum', emoji:'🎄', bpm:100,
    notes:[['C6',1],['F6',1.5],['F6',0.5],['F6',1],['G6',1],['A6',1.5],['A6',0.5],['A6',1],
           ['A6',0.5],['G6',0.5],['A6',1],['B6',1],['E6',1],['G6',1],['F6',2]] },
  { title:'Kling Glöckchen', emoji:'🔔', bpm:110,
    notes:[['E6',0.5],['G6',0.5],['E6',0.5],['G6',0.5],['A6',1],['A6',1],['G6',2],
           ['F6',0.5],['E6',0.5],['D6',0.5],['E6',0.5],['F6',1],['D6',2],
           ['E6',0.5],['G6',0.5],['E6',0.5],['G6',0.5],['A6',1],['A6',1],['G6',2],
           ['F6',0.5],['E6',0.5],['D6',0.5],['E6',0.5],['C6',2]] },
  { title:'Frühling', emoji:'🌸', bpm:100,
    notes:[['E6',1],['E6',0.5],['E6',0.5],['F6',1],['G6',1],['G6',0.5],['G6',0.5],
           ['A6',1],['G6',1],['F6',1],['E6',1],['D6',1],['C6',2],
           ['D6',1],['D6',0.5],['E6',0.5],['F6',1],['F6',1],['E6',1],['D6',1],['E6',1],['C6',2]] },
  { title:'Stups', emoji:'🐰', bpm:120,
    notes:[['G6',1],['E6',0.5],['E6',0.5],['F6',1],['D6',0.5],['D6',0.5],['E6',1],['C6',0.5],['C6',0.5],
           ['D6',1],['E6',1],['F6',1],['G6',1],['G6',1],['A6',1],['G6',1],['E6',2]] },
  { title:'Rackedicke', emoji:'🎵', bpm:110,
    notes:[['C6',0.5],['C6',0.5],['D6',1],['E6',0.5],['E6',0.5],['F6',1],['G6',0.5],['G6',0.5],
           ['A6',1],['G6',1],['F6',1],['E6',1],['D6',1],['C6',2]] },
  { title:'Gloria', emoji:'⭐', bpm:90,
    notes:[['E6',1.5],['D6',0.5],['E6',1],['G6',2],['G6',0.5],['F6',0.5],['E6',0.5],['D6',0.5],
           ['C6',1],['D6',1],['E6',1],['F6',1],['E6',1.5],['D6',0.5],['C6',2]] }
];

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let song = null, idx = 0, starCnt = 0;
let audioCtx = null, analyser = null, micOk = false;
let detecting = false, rafId = null;
let lastNote = '', confirmN = 0;
const CONFIRM = 2;
let fallingNotes = []; // [{el, noteId, targetTime, lane, hit}]
let songStartTime = 0;
let lanePositions = []; // x positions for each bar

// ════════════════════════════════════════════════════
//  SCREENS
// ════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function goMenu() { stopDetect(); show('selScreen'); buildGrid(); }

// ════════════════════════════════════════════════════
//  SONG GRID
// ════════════════════════════════════════════════════
function buildGrid() {
  const g = document.getElementById('sgrid'); g.innerHTML = '';
  SONGS.forEach((s,i) => {
    const b = document.createElement('button');
    b.className = 'sbtn';
    b.innerHTML = `<span class="em">${s.emoji}</span><span class="lb">${s.title}</span>`;
    b.onclick = () => pickSong(i);
    b.style.opacity = '0'; b.style.transform = 'translateY(18px) scale(0.9)';
    b.style.transition = `opacity .4s ease ${i*.07}s, transform .4s cubic-bezier(.34,1.56,.64,1) ${i*.07}s`;
    g.appendChild(b);
    requestAnimationFrame(() => { b.style.opacity = '1'; b.style.transform = 'none'; });
  });
}

function pickSong(i) {
  song = SONGS[i]; idx = 0; starCnt = 0;
  if (micOk) { startPlay(); return; }
  show('micScreen');
  document.getElementById('micErr').style.display = 'none';
}

document.getElementById('micGo').onclick = async () => {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC({ sampleRate: 44100 });
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    src.connect(analyser);
    micOk = true;
    startPlay();
  } catch(e) {
    console.error('Mic error:', e);
    document.getElementById('micErr').style.display = 'block';
  }
};

// ════════════════════════════════════════════════════
//  PLAY
// ════════════════════════════════════════════════════
function startPlay() {
  show('playScreen');
  document.getElementById('pTitle').textContent = song.emoji + ' ' + song.title;
  document.getElementById('pStars').textContent = '0';
  idx = 0; starCnt = 0;
  buildStrip();
  buildGlock();
  // small delay to allow layout, then start falling notes
  requestAnimationFrame(() => {
    computeLanePositions();
    spawnFallingNotes();
    updateUI();
    startDetect();
  });
}

function replay() { idx = 0; starCnt = 0; startPlay(); }

function buildStrip() {
  const s = document.getElementById('mstrip'); s.innerHTML = '';
  song.notes.forEach(([nid],i) => {
    const d = document.createElement('div');
    d.className = 'md'; d.dataset.i = i;
    const c = NRAW[nid[0]];
    d.style.background = c; d.style.color = c;
    s.appendChild(d);
  });
}

function buildGlock() {
  const g = document.getElementById('glock'); g.innerHTML = '';
  const maxH = 100, minH = 50, tot = BARS.length;
  BARS.forEach((bar,i) => {
    const el = document.createElement('div');
    el.className = 'bar'; el.dataset.id = bar.id;
    el.style.height = (maxH - (maxH-minH)*i/(tot-1)) + '%';
    const lbl = document.createElement('div');
    lbl.className = 'nn'; lbl.textContent = GERMAN[bar.n];
    el.appendChild(lbl);
    g.appendChild(el);
  });
}

function computeLanePositions() {
  lanePositions = [];
  const barEls = document.querySelectorAll('.bar');
  const laneArea = document.getElementById('laneArea');
  const laRect = laneArea.getBoundingClientRect();
  barEls.forEach(b => {
    const r = b.getBoundingClientRect();
    lanePositions.push({
      left: r.left - laRect.left,
      width: r.width,
      center: r.left - laRect.left + r.width/2
    });
  });
}

// ════════════════════════════════════════════════════
//  FALLING NOTES (Guitar Hero style)
// ════════════════════════════════════════════════════
const FALL_DURATION = 2000; // ms for note to fall from top to hit zone
const LOOK_AHEAD = 4; // show this many upcoming notes

function spawnFallingNotes() {
  // clear existing
  const la = document.getElementById('laneArea');
  la.querySelectorAll('.fnote').forEach(e => e.remove());
  fallingNotes = [];
  songStartTime = performance.now() + 1000; // 1s grace period

  // Calculate cumulative times
  let cumTime = 0;
  const beatMs = 60000 / song.bpm;
  song._times = song.notes.map(([nid, beats]) => {
    const t = cumTime;
    cumTime += beats * beatMs;
    return t;
  });
}

function updateFallingNotes(now) {
  const la = document.getElementById('laneArea');
  const elapsed = now - songStartTime;
  const laH = la.getBoundingClientRect().height;

  // Spawn upcoming notes
  for (let i = idx; i < song.notes.length && i < idx + LOOK_AHEAD; i++) {
    if (fallingNotes.find(fn => fn.idx === i)) continue;
    const targetTime = song._times[i];
    const spawnTime = targetTime - FALL_DURATION;
    if (elapsed >= spawnTime) {
      const [nid] = song.notes[i];
      const barIdx = BARS.findIndex(b => b.id === nid);
      if (barIdx < 0 || !lanePositions[barIdx]) continue;
      const el = document.createElement('div');
      el.className = 'fnote';
      const col = NRAW[nid[0]];
      el.style.background = `radial-gradient(circle at 35% 35%, ${col}ee, ${col})`;
      el.style.color = col;
      el.textContent = GERMAN[nid[0]];
      const lp = lanePositions[barIdx];
      const noteSize = Math.min(lp.width * 0.8, 36);
      el.style.width = noteSize + 'px';
      el.style.height = noteSize + 'px';
      el.style.left = (lp.center - noteSize/2) + 'px';
      el.style.borderRadius = '50%';
      if (i === idx) el.classList.add('waiting');
      la.appendChild(el);
      fallingNotes.push({ el, idx: i, noteId: nid, targetTime, barIdx, hit: false });
    }
  }

  // Update positions
  for (const fn of fallingNotes) {
    if (fn.hit) continue;
    const timeToTarget = fn.targetTime - elapsed;
    const progress = 1 - (timeToTarget / FALL_DURATION);
    const y = progress * (laH - 10);
    fn.el.style.top = Math.max(-40, y) + 'px';

    // If note has reached bottom and waited too long (>3s), just sit there
    if (progress > 1) {
      fn.el.style.top = (laH - 10) + 'px';
    }
  }

  // Clean up old hit notes
  fallingNotes = fallingNotes.filter(fn => {
    if (fn.hit && Date.now() - fn.hitTime > 400) {
      fn.el.remove();
      return false;
    }
    return true;
  });
}

function hitFallingNote(noteIdx) {
  const fn = fallingNotes.find(f => f.idx === noteIdx);
  if (fn) {
    fn.hit = true;
    fn.hitTime = Date.now();
    fn.el.style.transform = 'scale(1.5)';
    fn.el.style.opacity = '0';
  }
}

// ════════════════════════════════════════════════════
//  UPDATE UI
// ════════════════════════════════════════════════════
function updateUI() {
  if (!song) return;
  if (idx >= song.notes.length) { celebrate(); return; }

  const [tid] = song.notes[idx];
  const tn = tid[0];
  const barIdx = BARS.findIndex(b => b.id === tid);
  const col = NRAW[tn];

  // dots
  document.querySelectorAll('.md').forEach((d,i) => {
    d.classList.remove('cur','done');
    if (i < idx) d.classList.add('done');
    if (i === idx) d.classList.add('cur');
  });
  const curDot = document.querySelector('.md.cur');
  if (curDot) curDot.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });

  // target bar highlight
  document.querySelectorAll('.bar').forEach(b => {
    b.classList.remove('target','played-correct','played-wrong');
    b.style.setProperty('--tc','transparent');
  });
  const tBar = document.querySelector(`.bar[data-id="${tid}"]`);
  if (tBar) {
    tBar.style.setProperty('--tc', col);
    tBar.classList.add('target');
  }

  document.getElementById('pStars').textContent = starCnt;
}

// ════════════════════════════════════════════════════
//  PITCH DETECTION — Autocorrelation
// ════════════════════════════════════════════════════
function acf(buf, sr) {
  const N = buf.length;
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/N);
  if (rms < 0.001) return -1;
  let r1=0, r2=N-1;
  const th = 0.15;
  for (let i=0;i<N/2;i++) if(Math.abs(buf[i])<th){r1=i;break;}
  for (let i=1;i<N/2;i++) if(Math.abs(buf[N-i])<th){r2=N-i;break;}
  const tb = buf.slice(r1,r2+1);
  const L = tb.length;
  if (L < 2) return -1;
  const c = new Float32Array(L);
  for (let i=0;i<L;i++) for(let j=0;j<L-i;j++) c[i]+=tb[j]*tb[j+i];
  let d=0;
  while(c[d]>c[d+1]){d++;if(d>=L-1)return -1;}
  let mx=-1,mp=-1;
  for(let i=d;i<L;i++){if(c[i]>mx){mx=c[i];mp=i;}}
  let T=mp;
  if(T>0&&T<L-1){
    const a=(c[T-1]+c[T+1]-2*c[T])/2, b=(c[T+1]-c[T-1])/2;
    if(a) T=T-b/(2*a);
  }
  return sr/T;
}

function freqToId(f) {
  if (f<800||f>3000) return null;
  let best=null, bestD=Infinity;
  for (const b of BARS) {
    const cents = Math.abs(1200*Math.log2(f/b.freq));
    if (cents < bestD) { bestD=cents; best=b; }
  }
  return (best && bestD < 120) ? best.id : null;
}

function startDetect() {
  if (!analyser) return;
  detecting = true; confirmN = 0; lastNote = '';
  loop();
}
function stopDetect() {
  detecting = false;
  if(rafId) cancelAnimationFrame(rafId);
  // clear falling notes
  const la = document.getElementById('laneArea');
  if (la) la.querySelectorAll('.fnote').forEach(e => e.remove());
  fallingNotes = [];
}

let _lastPlayedBar = null;
let _lastPlayedTime = 0;

function loop() {
  if (!detecting) return;
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const f = acf(buf, audioCtx.sampleRate);
  const nid = f > 0 ? freqToId(f) : null;
  const now = performance.now();

  document.getElementById('dbg').textContent = nid ? nid+' ('+Math.round(f)+'Hz)' : '';

  // Update falling notes
  updateFallingNotes(now);

  // Light up played bar
  if (nid) {
    const playedBar = document.querySelector(`.bar[data-id="${nid}"]`);
    if (playedBar && song && idx < song.notes.length) {
      const [target] = song.notes[idx];
      // Clear previous played highlight
      if (_lastPlayedBar && _lastPlayedBar !== playedBar) {
        _lastPlayedBar.classList.remove('played-correct','played-wrong');
      }
      if (nid === target) {
        playedBar.classList.remove('played-wrong');
        playedBar.classList.add('played-correct');
      } else {
        playedBar.classList.remove('played-correct');
        playedBar.classList.add('played-wrong');
      }
      _lastPlayedBar = playedBar;
      _lastPlayedTime = Date.now();
    }
  }

  // Clear played highlight after 600ms
  if (_lastPlayedBar && Date.now() - _lastPlayedTime > 600) {
    _lastPlayedBar.classList.remove('played-correct','played-wrong');
    _lastPlayedBar = null;
  }

  // Note matching
  if (nid && song && idx < song.notes.length) {
    const [target] = song.notes[idx];
    if (nid === target) {
      if (nid === lastNote) confirmN++; else confirmN = 1;
      if (confirmN >= CONFIRM) { onCorrect(); confirmN = 0; }
    } else {
      if (nid !== lastNote) confirmN = 0;
    }
    lastNote = nid;
  }

  rafId = requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════
//  CORRECT NOTE
// ════════════════════════════════════════════════════
function onCorrect() {
  const [nid] = song.notes[idx];
  const n = nid[0];
  starCnt++;

  hitFallingNote(idx);

  const bar = document.querySelector(`.bar[data-id="${nid}"]`);
  if (bar) {
    const r = bar.getBoundingClientRect();
    sparkle(r.left+r.width/2, r.top+r.height*0.3, NRAW[n]);
  }

  idx++;
  setTimeout(updateUI, 180);
}

// ════════════════════════════════════════════════════
//  SPARKLES
// ════════════════════════════════════════════════════
function sparkle(x, y) {
  const c = document.getElementById('sparks');
  const ems = ['✨','⭐','💫','🌟','✨'];
  for (let i=0;i<7;i++){
    const s = document.createElement('div');
    s.className = 'spk'; s.textContent = ems[i%ems.length];
    s.style.left = x+'px'; s.style.top = y+'px';
    const a = Math.PI*2*i/7 + (Math.random()-.5)*.6;
    const d = 35+Math.random()*55;
    s.style.setProperty('--tx', Math.cos(a)*d+'px');
    s.style.setProperty('--ty', (Math.sin(a)*d - 25)+'px');
    c.appendChild(s);
    setTimeout(()=>s.remove(), 900);
  }
}

// ════════════════════════════════════════════════════
//  CELEBRATION
// ════════════════════════════════════════════════════
function celebrate() {
  stopDetect();
  show('celScreen');
  const cols = ['#E74C3C','#E67E22','#F1C40F','#27AE60','#3498DB','#6366F1','#9B59B6','#FF6B8A'];
  for (let i=0;i<55;i++){
    setTimeout(()=>{
      const p = document.createElement('div');
      p.className = 'confetti';
      p.style.left = Math.random()*100+'vw';
      p.style.background = cols[Math.floor(Math.random()*cols.length)];
      const sz = 6+Math.random()*10;
      p.style.width = sz+'px'; p.style.height = sz+'px';
      p.style.borderRadius = Math.random()>.5?'50%':'2px';
      p.style.animationDuration = (2+Math.random()*2.5)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 5000);
    }, i*45);
  }
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
buildGrid();
</script>
