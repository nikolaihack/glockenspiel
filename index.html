<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glockenspiel">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<title>🎵 Mein Glockenspiel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FFF8F0; --warm: #7C5A3C; --warmL: #A08060; --shadow: rgba(160,120,70,0.16);
  --nC:#E74C3C; --nD:#E67E22; --nE:#F1C40F; --nF:#27AE60; --nG:#3498DB; --nA:#6366F1; --nB:#9B59B6;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: 'Avenir Next','Nunito','Quicksand',-apple-system,sans-serif;
  background: var(--bg);
  touch-action: manipulation;
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color: transparent;
}

/* ══════ SCREENS ══════ */
.scr { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.scr.on { display:flex; flex-direction:column; }

/* ══════ SONG SELECT ══════ */
#selScreen {
  background: linear-gradient(155deg,#FFF5EE 0%,#FDEBD3 35%,#E6F0FA 100%);
  align-items:center; justify-content:center; gap:22px; padding:20px;
}
.logo { font-size:clamp(26px,5.5vw,46px); font-weight:800; color:var(--warm); text-align:center; }
.sub { font-size:clamp(12px,2.2vw,16px); color:var(--warmL); font-weight:600; margin-top:-10px; }
.sgrid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:clamp(10px,2.2vw,22px); max-width:560px; width:100%; padding:0 10px;
}
.sbtn {
  aspect-ratio:1; border:none; border-radius:24px; background:white;
  box-shadow: 0 4px 18px var(--shadow), 0 1px 3px rgba(0,0,0,0.04);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  padding:8px; position:relative; overflow:hidden;
}
.sbtn::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 30% 30%,rgba(255,255,255,0.6) 0%,transparent 70%);
  pointer-events:none;
}
.sbtn:active { transform:scale(0.91); }
.sbtn .em { font-size:clamp(34px,7.5vw,56px); line-height:1; z-index:1; }
.sbtn .lb {
  font-size:clamp(8px,1.4vw,11px); color:var(--warmL);
  text-align:center; line-height:1.15; font-weight:700; z-index:1;
}

/* ══════ MIC SCREEN ══════ */
#micScreen {
  background: linear-gradient(155deg,#FFF5EE,#E6F0FA);
  align-items:center; justify-content:center; gap:28px; padding:40px;
}
.mic-icon { font-size:clamp(60px,18vw,100px); animation:micFloat 2s ease-in-out infinite; }
@keyframes micFloat {
  0%,100%{ transform:translateY(0) rotate(-3deg); }
  50%{ transform:translateY(-14px) rotate(3deg); }
}
.mic-msg {
  font-size:clamp(14px,3vw,20px); color:var(--warm);
  text-align:center; font-weight:600; line-height:1.5; max-width:340px;
}
.mic-go {
  padding:18px 52px; border:none; border-radius:50px;
  background: linear-gradient(135deg,#FF9A56,#FF6B8A);
  color:white; font-size:clamp(18px,4vw,26px); font-weight:800;
  cursor:pointer; box-shadow:0 6px 28px rgba(255,107,138,0.3);
  transition: transform 0.2s; font-family:inherit;
}
.mic-go:active { transform:scale(0.94); }
.mic-err {
  font-size:clamp(12px,2.2vw,15px); color:#E74C3C;
  text-align:center; max-width:320px; font-weight:600;
  display:none; line-height:1.4;
}

/* ══════ PLAY SCREEN ══════ */
#playScreen {
  background: linear-gradient(180deg,#FFF8F0 0%,#FEF2E6 100%);
  padding:6px 8px 8px; gap:0;
}
/* Top bar */
.tbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:2px 4px; flex-shrink:0; min-height:42px;
}
.bbtn {
  width:40px; height:40px; border:none; border-radius:50%;
  background:white; box-shadow:0 2px 10px var(--shadow);
  font-size:18px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
  font-family:inherit; color:var(--warm); transition:transform .15s;
}
.bbtn:active { transform:scale(0.88); }
.stitle { font-size:clamp(14px,2.6vw,21px); color:var(--warm); font-weight:800; }
.stars {
  display:flex; align-items:center; gap:3px;
  background:white; border-radius:14px; padding:3px 10px;
  box-shadow:0 2px 10px var(--shadow);
  font-weight:800; font-size:clamp(13px,2.4vw,18px);
}
.stars .si { color:#F1C40F; }
.stars .sn { color:var(--warm); }

/* Melody dots */
.mstrip {
  display:flex; align-items:center; justify-content:center;
  gap:clamp(3px,0.65vw,6px); padding:8px 4px; flex-shrink:0;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  min-height:48px; scrollbar-width:none;
}
.mstrip::-webkit-scrollbar { display:none; }
.md {
  width:clamp(15px,3vw,26px); height:clamp(15px,3vw,26px);
  border-radius:50%; flex-shrink:0;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s, box-shadow .3s;
  position:relative; opacity:0.28; border:2px solid transparent;
}
.md.done {
  opacity:1; border-color:rgba(255,255,255,0.7);
  box-shadow:0 0 0 2px rgba(255,255,255,0.3);
}
.md.done::after {
  content:'✓'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(8px,1.5vw,12px); color:white; font-weight:900;
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
}
.md.cur {
  opacity:1; transform:scale(1.5);
  border-color:white;
  box-shadow:0 0 0 3px white, 0 0 18px currentColor, 0 0 36px currentColor;
  animation: mdPulse 1.1s ease-in-out infinite;
}
@keyframes mdPulse {
  0%,100%{ box-shadow:0 0 0 3px white,0 0 14px currentColor; transform:scale(1.45); }
  50%{ box-shadow:0 0 0 4px white,0 0 24px currentColor,0 0 44px currentColor; transform:scale(1.6); }
}

/* Hint */
.hint {
  text-align:center; flex-shrink:0; padding:2px 0 4px;
  min-height:48px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:1px;
}
.hpos {
  font-size:clamp(17px,3.4vw,27px); font-weight:800; color:var(--warm);
  display:flex; align-items:center; gap:6px;
}
.hbadge {
  display:inline-flex; align-items:center; justify-content:center;
  background:white; border-radius:11px; padding:2px 13px;
  box-shadow:0 2px 10px var(--shadow); min-width:38px;
}
.hnote {
  font-size:clamp(11px,2vw,15px); color:var(--warmL); font-weight:600; opacity:0.8;
}

/* Glockenspiel */
.garea {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:0 2px; min-height:0;
}
.glock {
  display:flex; align-items:flex-end;
  gap:clamp(2px,0.4vw,5px);
  height:100%; max-height:230px; width:100%; justify-content:center;
}
.bar {
  flex:1; max-width:48px; min-width:0;
  border-radius:6px 6px 4px 4px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
  padding-bottom:clamp(4px,1vw,9px);
  position:relative; cursor:default;
  transition: transform .15s, filter .2s, box-shadow .3s;
  background: linear-gradient(180deg,#DCDCDC 0%,#C2C2C2 40%,#AAAAAA 100%);
  box-shadow: 0 3px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -1px 0 rgba(0,0,0,0.05);
  border:1px solid rgba(255,255,255,0.22);
}
.bar .nn {
  font-size:clamp(10px,2vw,18px); font-weight:900;
  color:rgba(255,255,255,0.45); text-shadow:0 1px 2px rgba(0,0,0,0.12);
  pointer-events:none; z-index:2; line-height:1;
}
.bar.target {
  animation: bPulse 1.1s ease-in-out infinite;
  z-index:5; border:2px solid rgba(255,255,255,0.5);
}
.bar.target .nn { color:white; text-shadow:0 1px 4px rgba(0,0,0,0.25); }
@keyframes bPulse {
  0%,100%{ filter:brightness(1); box-shadow:0 0 10px rgba(255,255,255,0.15); }
  50%{ filter:brightness(1.2); box-shadow:0 0 24px rgba(255,255,255,0.4),0 0 48px var(--glow,transparent); }
}
.bar.hit { animation: bHit .4s ease; }
@keyframes bHit {
  0%{ transform:scale(1); }
  30%{ transform:scale(1.1); filter:brightness(1.45); }
  100%{ transform:scale(1); filter:brightness(1); }
}

/* Status */
.sbar {
  display:flex; align-items:center; justify-content:center;
  gap:6px; padding:3px 0; flex-shrink:0; min-height:22px;
}
.sdot {
  width:7px; height:7px; border-radius:50%; background:#27AE60;
  animation: sdPulse 1.4s ease infinite;
}
@keyframes sdPulse { 0%,100%{opacity:.35;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
.stxt { font-size:clamp(10px,1.7vw,13px); color:var(--warmL); font-weight:600; }

/* ══════ SPARKLES ══════ */
#sparks { position:fixed; inset:0; pointer-events:none; z-index:200; }
.spk {
  position:absolute; pointer-events:none; font-size:18px;
  animation: spkFly .85s ease-out forwards;
}
@keyframes spkFly {
  0%{ opacity:1; transform:translate(0,0) scale(1) rotate(0); }
  100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(.15) rotate(420deg); }
}

/* ══════ CELEBRATION ══════ */
#celScreen {
  background: linear-gradient(160deg,#FFF8F0 0%,#FFEAA7 50%,#E8F4FD 100%);
  align-items:center; justify-content:center; flex-direction:column; gap:16px; padding:30px;
}
.ctrophy { font-size:clamp(60px,16vw,120px); animation:cBounce .85s ease infinite; }
@keyframes cBounce { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-18px) rotate(3deg)} }
.cstars { display:flex; gap:8px; font-size:clamp(28px,7vw,50px); animation:csIn .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes csIn { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
.cmsg { font-size:clamp(18px,4vw,28px); color:var(--warm); font-weight:800; text-align:center; }
.cbtns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.cbtn {
  padding:15px 36px; border:none; border-radius:50px;
  font-size:clamp(16px,3.5vw,24px); font-weight:800;
  cursor:pointer; transition:transform .2s; font-family:inherit;
  box-shadow:0 4px 18px var(--shadow);
}
.cbtn:active { transform:scale(0.93); }
.cbtn.again { background:linear-gradient(135deg,#FF9A56,#FF6B8A); color:white; }
.cbtn.home { background:white; color:var(--warm); }

/* Confetti */
.confetti {
  position:fixed; top:-20px; width:10px; height:10px;
  border-radius:2px; pointer-events:none; z-index:199;
  animation: cFall linear forwards;
}
@keyframes cFall { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

/* Debug */
.dbg { position:fixed;bottom:3px;right:3px;font-size:9px;color:#ccc;opacity:.4;pointer-events:none;z-index:300; }
</style>
</head>
<body>

<div id="sparks"></div>

<!-- ═══ SONG SELECT ═══ -->
<div class="scr on" id="selScreen">
  <div class="logo">🎵 Mein Glockenspiel 🎵</div>
  <div class="sub">Wähle ein Lied!</div>
  <div class="sgrid" id="sgrid"></div>
</div>

<!-- ═══ MIC PROMPT ═══ -->
<div class="scr" id="micScreen">
  <div class="mic-icon">🎤</div>
  <div class="mic-msg">Erlaube das Mikrofon, damit ich dein Glockenspiel hören kann!</div>
  <button class="mic-go" id="micGo">▶️ Los geht's!</button>
  <div class="mic-err" id="micErr">
    ❌ Mikrofon nicht verfügbar.<br>
    Bitte öffne die App in Safari und erlaube den Zugriff.
  </div>
</div>

<!-- ═══ PLAY ═══ -->
<div class="scr" id="playScreen">
  <div class="tbar">
    <button class="bbtn" onclick="goMenu()">↩</button>
    <div class="stitle" id="pTitle"></div>
    <div class="stars"><span class="si">⭐</span><span class="sn" id="pStars">0</span></div>
  </div>
  <div class="mstrip" id="mstrip"></div>
  <div class="hint" id="hintArea"></div>
  <div class="garea"><div class="glock" id="glock"></div></div>
  <div class="sbar">
    <div class="sdot"></div>
    <span class="stxt">Ich höre zu…</span>
  </div>
</div>

<!-- ═══ CELEBRATION ═══ -->
<div class="scr" id="celScreen">
  <div class="ctrophy">🎉</div>
  <div class="cstars">⭐⭐⭐</div>
  <div class="cmsg">Super gemacht!</div>
  <div class="cbtns">
    <button class="cbtn again" onclick="replay()">🔄 Nochmal!</button>
    <button class="cbtn home" onclick="goMenu()">🏠</button>
  </div>
</div>

<div class="dbg" id="dbg"></div>

<script>
// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
const NOTES = ['C','D','E','F','G','A','B'];
const GERMAN = {C:'C',D:'D',E:'E',F:'F',G:'G',A:'A',B:'H'};
const NCOL = {C:'var(--nC)',D:'var(--nD)',E:'var(--nE)',F:'var(--nF)',G:'var(--nG)',A:'var(--nA)',B:'var(--nB)'};
const NRAW = {C:'#E74C3C',D:'#E67E22',E:'#F1C40F',F:'#27AE60',G:'#3498DB',A:'#6366F1',B:'#9B59B6'};
const SEMI = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};

// Build glockenspiel note list C5-D7
const BARS = [];
for (let o = 5; o <= 7; o++) {
  for (const n of NOTES) {
    const midi = SEMI[n] + (o+1)*12;
    BARS.push({ n, o, midi, freq: 440*Math.pow(2,(midi-69)/12), id: n+o });
    if (n==='D' && o===7) break;
  }
}

const SONGS = [
  { title:'Oh Tannenbaum', emoji:'🎄',
    notes:['C5','F5','F5','F5','G5','A5','A5','A5','A5','G5','A5','B5','E5','G5','F5'] },
  { title:'Kling Glöckchen', emoji:'🔔',
    notes:['E5','G5','E5','G5','A5','A5','A5','G5','F5','E5','D5','E5','F5','D5',
            'E5','G5','E5','G5','A5','A5','A5','G5','F5','E5','D5','E5','C5'] },
  { title:'Frühling', emoji:'🌸',
    notes:['E5','E5','E5','F5','G5','G5','G5','A5','G5','F5','E5','D5','C5',
            'D5','D5','E5','F5','F5','E5','D5','E5','C5'] },
  { title:'Stups', emoji:'🐰',
    notes:['G5','E5','E5','F5','D5','D5','E5','C5','C5',
            'D5','E5','F5','G5','G5','A5','G5','E5'] },
  { title:'Rackedicke', emoji:'🎵',
    notes:['C5','C5','D5','E5','E5','F5','G5','G5','A5','G5',
            'F5','E5','D5','C5'] },
  { title:'Gloria', emoji:'⭐',
    notes:['E5','D5','E5','G5','G5','F5','E5','D5',
            'C5','D5','E5','F5','E5','D5','C5'] }
];

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let song = null, idx = 0, starCnt = 0;
let audioCtx = null, analyser = null, micOk = false;
let detecting = false, rafId = null;
let lastNote = '', confirmN = 0;
const CONFIRM = 3;

// ════════════════════════════════════════════════════
//  SCREENS
// ════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function goMenu() {
  stopDetect();
  show('selScreen');
  buildGrid();
}

// ════════════════════════════════════════════════════
//  SONG GRID
// ════════════════════════════════════════════════════
function buildGrid() {
  const g = document.getElementById('sgrid'); g.innerHTML = '';
  SONGS.forEach((s,i) => {
    const b = document.createElement('button');
    b.className = 'sbtn';
    b.innerHTML = `<span class="em">${s.emoji}</span><span class="lb">${s.title}</span>`;
    b.onclick = () => pickSong(i);
    b.style.opacity = '0'; b.style.transform = 'translateY(18px) scale(0.9)';
    b.style.transition = `opacity .4s ease ${i*.07}s, transform .4s cubic-bezier(.34,1.56,.64,1) ${i*.07}s`;
    g.appendChild(b);
    requestAnimationFrame(() => { b.style.opacity = '1'; b.style.transform = 'none'; });
  });
}

// ════════════════════════════════════════════════════
//  SONG PICK → MIC → PLAY
// ════════════════════════════════════════════════════
function pickSong(i) {
  song = SONGS[i]; idx = 0; starCnt = 0;
  if (micOk) { startPlay(); return; }
  show('micScreen');
  document.getElementById('micErr').style.display = 'none';
}

document.getElementById('micGo').onclick = async () => {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC({ sampleRate: 44100 });
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    src.connect(analyser);
    micOk = true;
    startPlay();
  } catch(e) {
    console.error('Mic error:', e);
    document.getElementById('micErr').style.display = 'block';
  }
};

// ════════════════════════════════════════════════════
//  PLAY
// ════════════════════════════════════════════════════
function startPlay() {
  show('playScreen');
  document.getElementById('pTitle').textContent = song.emoji + ' ' + song.title;
  document.getElementById('pStars').textContent = '0';
  idx = 0; starCnt = 0;
  buildStrip();
  buildGlock();
  updateUI();
  startDetect();
}

function replay() { idx = 0; starCnt = 0; startPlay(); }

// ── melody strip ──
function buildStrip() {
  const s = document.getElementById('mstrip'); s.innerHTML = '';
  song.notes.forEach((nid,i) => {
    const d = document.createElement('div');
    d.className = 'md'; d.dataset.i = i;
    const c = NRAW[nid[0]];
    d.style.background = c; d.style.color = c;
    s.appendChild(d);
  });
}

// ── glockenspiel bars ──
function buildGlock() {
  const g = document.getElementById('glock'); g.innerHTML = '';
  const maxH = 100, minH = 42, tot = BARS.length;
  BARS.forEach((bar,i) => {
    const el = document.createElement('div');
    el.className = 'bar'; el.dataset.id = bar.id;
    el.style.height = (maxH - (maxH-minH)*i/(tot-1)) + '%';
    const lbl = document.createElement('div');
    lbl.className = 'nn'; lbl.textContent = GERMAN[bar.n];
    el.appendChild(lbl);
    g.appendChild(el);
  });
}

// ── update UI for current note ──
function updateUI() {
  if (!song) return;
  if (idx >= song.notes.length) { celebrate(); return; }

  const tid = song.notes[idx];
  const tn = tid[0];
  const barIdx = BARS.findIndex(b => b.id === tid);
  const col = NRAW[tn];

  // dots
  document.querySelectorAll('.md').forEach((d,i) => {
    d.classList.remove('cur','done');
    if (i < idx) d.classList.add('done');
    if (i === idx) d.classList.add('cur');
  });
  const curDot = document.querySelector('.md.cur');
  if (curDot) curDot.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });

  // bars
  document.querySelectorAll('.bar').forEach(b => {
    b.classList.remove('target');
    b.style.background = '';
    b.style.setProperty('--glow','transparent');
    b.querySelector('.nn').style.color = 'rgba(255,255,255,0.45)';
  });
  const tBar = document.querySelector(`.bar[data-id="${tid}"]`);
  if (tBar) {
    tBar.style.background = `linear-gradient(180deg,${col}cc 0%,${col} 45%,${col}dd 100%)`;
    tBar.style.setProperty('--glow', col);
    tBar.classList.add('target');
    tBar.querySelector('.nn').style.color = 'white';
  }

  // hint
  const h = document.getElementById('hintArea');
  if (barIdx >= 0) {
    h.innerHTML = `
      <div class="hpos">
        <span>👈</span>
        <span class="hbadge" style="color:${col}">${barIdx+1}.</span>
        <span style="font-size:.75em">Taste</span>
      </div>
      <div class="hnote">Note: <strong style="color:${col}">${GERMAN[tn]}</strong></div>`;
  }

  document.getElementById('pStars').textContent = starCnt;
}

// ════════════════════════════════════════════════════
//  PITCH DETECTION — Autocorrelation
// ════════════════════════════════════════════════════
function acf(buf, sr) {
  const N = buf.length;
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/N);
  if (rms < 0.012) return -1;

  // trim silence
  let r1=0, r2=N-1;
  const th = 0.15;
  for (let i=0;i<N/2;i++) if(Math.abs(buf[i])<th){r1=i;break;}
  for (let i=1;i<N/2;i++) if(Math.abs(buf[N-i])<th){r2=N-i;break;}
  const tb = buf.slice(r1,r2+1);
  const L = tb.length;
  if (L < 2) return -1;

  const c = new Float32Array(L);
  for (let i=0;i<L;i++) for(let j=0;j<L-i;j++) c[i]+=tb[j]*tb[j+i];

  let d=0;
  while(c[d]>c[d+1]){d++;if(d>=L-1)return -1;}
  let mx=-1,mp=-1;
  for(let i=d;i<L;i++){if(c[i]>mx){mx=c[i];mp=i;}}

  // parabolic interp
  let T=mp;
  if(T>0&&T<L-1){
    const a=(c[T-1]+c[T+1]-2*c[T])/2, b=(c[T+1]-c[T-1])/2;
    if(a) T=T-b/(2*a);
  }
  return sr/T;
}

function freqToId(f) {
  if (f<480||f>2500) return null;
  let best=null, bestD=Infinity;
  for (const b of BARS) {
    const cents = Math.abs(1200*Math.log2(f/b.freq));
    if (cents < bestD) { bestD=cents; best=b; }
  }
  return (best && bestD < 80) ? best.id : null;
}

function startDetect() {
  if (!analyser) return;
  detecting = true; confirmN = 0; lastNote = '';
  loop();
}
function stopDetect() { detecting = false; if(rafId) cancelAnimationFrame(rafId); }

function loop() {
  if (!detecting) return;
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const f = acf(buf, audioCtx.sampleRate);
  const nid = f > 0 ? freqToId(f) : null;

  document.getElementById('dbg').textContent = nid ? nid+' ('+Math.round(f)+'Hz)' : '';

  if (nid && song && idx < song.notes.length) {
    const target = song.notes[idx];
    if (nid === target) {
      if (nid === lastNote) confirmN++; else confirmN = 1;
      if (confirmN >= CONFIRM) { onCorrect(); confirmN = 0; }
    } else {
      if (nid !== lastNote) confirmN = 0;
    }
    lastNote = nid;
  }
  rafId = requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════
//  CORRECT NOTE
// ════════════════════════════════════════════════════
function onCorrect() {
  const nid = song.notes[idx];
  const n = nid[0];
  starCnt++;

  const bar = document.querySelector(`.bar[data-id="${nid}"]`);
  if (bar) {
    bar.classList.remove('target');
    bar.classList.add('hit');
    bar.addEventListener('animationend', ()=>bar.classList.remove('hit'), {once:true});
    const r = bar.getBoundingClientRect();
    sparkle(r.left+r.width/2, r.top+r.height*0.3, NRAW[n]);
  }

  idx++;
  setTimeout(updateUI, 180);
}

// ════════════════════════════════════════════════════
//  SPARKLES
// ════════════════════════════════════════════════════
function sparkle(x, y) {
  const c = document.getElementById('sparks');
  const ems = ['✨','⭐','💫','🌟','✨'];
  for (let i=0;i<7;i++){
    const s = document.createElement('div');
    s.className = 'spk'; s.textContent = ems[i%ems.length];
    s.style.left = x+'px'; s.style.top = y+'px';
    const a = Math.PI*2*i/7 + (Math.random()-.5)*.6;
    const d = 35+Math.random()*55;
    s.style.setProperty('--tx', Math.cos(a)*d+'px');
    s.style.setProperty('--ty', (Math.sin(a)*d - 25)+'px');
    c.appendChild(s);
    setTimeout(()=>s.remove(), 900);
  }
}

// ════════════════════════════════════════════════════
//  CELEBRATION
// ════════════════════════════════════════════════════
function celebrate() {
  stopDetect();
  show('celScreen');
  confetti();
}

function confetti() {
  const cols = ['#E74C3C','#E67E22','#F1C40F','#27AE60','#3498DB','#6366F1','#9B59B6','#FF6B8A'];
  for (let i=0;i<55;i++){
    setTimeout(()=>{
      const p = document.createElement('div');
      p.className = 'confetti';
      p.style.left = Math.random()*100+'vw';
      p.style.background = cols[Math.floor(Math.random()*cols.length)];
      const sz = 6+Math.random()*10;
      p.style.width = sz+'px'; p.style.height = sz+'px';
      p.style.borderRadius = Math.random()>.5?'50%':'2px';
      p.style.animationDuration = (2+Math.random()*2.5)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 5000);
    }, i*45);
  }
}

buildGrid();
